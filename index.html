<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自律打卡</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #1a1a2e; color: #eee; min-height: 100vh; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        h1 { text-align: center; color: #00d4ff; margin-bottom: 10px; }
        .date-nav { display: flex; justify-content: center; gap: 20px; align-items: center; margin-bottom: 20px; }
        .date-nav button { background: #16213e; color: #fff; border: 1px solid #00d4ff; padding: 8px 16px; border-radius: 5px; cursor: pointer; }
        .date-nav button:hover { background: #00d4ff; color: #1a1a2e; }
        .date-nav span { font-size: 18px; color: #00d4ff; }
        .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; margin-bottom: 25px; }
        .stat-card { background: #16213e; padding: 15px; border-radius: 10px; text-align: center; border: 1px solid #0f3460; }
        .stat-card .label { color: #888; font-size: 12px; }
        .stat-card .value { font-size: 28px; color: #00d4ff; font-weight: bold; }
        .add-task { display: flex; gap: 10px; margin-bottom: 20px; }
        .add-task input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #0f3460; background: #16213e; color: #fff; font-size: 14px; }
        .add-task button { padding: 12px 24px; background: #00d4ff; color: #1a1a2e; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .task-list { display: flex; flex-direction: column; gap: 10px; }
        .task-item { display: flex; align-items: center; gap: 15px; padding: 15px; background: #16213e; border-radius: 10px; border-left: 4px solid #0f3460; }
        .task-item.completed { border-left-color: #00d4ff; opacity: 0.8; }
        .task-item.completed .task-name { text-decoration: line-through; color: #888; }
        .task-item input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #00d4ff; }
        .task-item .task-name { flex: 1; font-size: 15px; }
        .task-item .delete-btn { background: none; border: none; color: #ff4757; cursor: pointer; font-size: 18px; opacity: 0.5; }
        .week-stats { margin-top: 30px; }
        .week-stats h3 { color: #00d4ff; margin-bottom: 15px; }
        .week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; }
        .day-stat { background: #16213e; padding: 12px 8px; border-radius: 8px; text-align: center; }
        .day-stat .day-name { font-size: 11px; color: #888; }
        .day-stat .day-count { font-size: 20px; color: #00d4ff; font-weight: bold; }
        .day-stat .day-total { font-size: 11px; color: #666; }
        .day-stat.today { border: 2px solid #00d4ff; }
        .history { margin-top: 30px; }
        .history h3 { color: #00d4ff; margin-bottom: 15px; }
        .history-item { display: flex; justify-content: space-between; padding: 10px; background: #16213e; border-radius: 8px; margin-bottom: 8px; }
        .history-item span { color: #888; }
    </style>
</head>
<body>
    <div class="container">
        <h1>自律打卡</h1>
        <div class="date-nav">
            <button onclick="changeDate(-1)">前一天</button>
            <span id="currentDate"></span>
            <button onclick="changeDate(1)">后一天</button>
        </div>
        <div class="stats">
            <div class="stat-card"><div class="label">今日完成</div><div class="value" id="todayDone">0</div></div>
            <div class="stat-card"><div class="label">今日任务</div><div class="value" id="todayTotal">0</div></div>
            <div class="stat-card"><div class="label">完成率</div><div class="value" id="todayRate">0%</div></div>
            <div class="stat-card"><div class="label">连续天数</div><div class="value" id="streak">0</div></div>
        </div>
        <div class="add-task">
            <input type="text" id="newTask" placeholder="添加新任务..." onkeypress="if(event.key==='Enter')addTask()">
            <button onclick="addTask()">添加</button>
        </div>
        <div class="task-list" id="taskList"></div>
        <div class="week-stats">
            <h3>本周进度</h3>
            <div class="week-grid" id="weekStats"></div>
        </div>
        <div class="history">
            <h3>历史记录</h3>
            <div id="historyList"></div>
        </div>
    </div>
    <script>
        let currentOffset = 0;
        const STORAGE_KEY = 'self-discipline-data';
        function getData() { return JSON.parse(localStorage.getItem(STORAGE_KEY) || '{"tasks":{}}'); }
        function saveData(data) { localStorage.setItem(STORAGE_KEY, JSON.stringify(data)); }
        function getDateStr(offset) {
            const d = new Date(); d.setDate(d.getDate() + offset);
            return d.toISOString().split('T')[0];
        }
        function formatDate(dateStr) {
            const d = new Date(dateStr);
            const weekdays = ['日','一','二','三','四','五','六'];
            return (d.getMonth()+1) + '月' + d.getDate() + '日 周' + weekdays[d.getDay()];
        }
        function changeDate(delta) { currentOffset += delta; render(); }
        function addTask() {
            const name = document.getElementById('newTask').value.trim();
            if (!name) return;
            const data = getData();
            const dateStr = getDateStr(currentOffset);
            if (!data.tasks[dateStr]) data.tasks[dateStr] = [];
            data.tasks[dateStr].push({ id: Date.now(), name: name, done: false });
            saveData(data);
            document.getElementById('newTask').value = '';
            render();
        }
        function toggleTask(id) {
            const data = getData();
            const task = data.tasks[getDateStr(currentOffset)]?.find(t => t.id === id);
            if (task) { task.done = !task.done; saveData(data); render(); }
        }
        function deleteTask(id) {
            const data = getData();
            const tasks = data.tasks[getDateStr(currentOffset)];
            if (tasks) { data.tasks[getDateStr(currentOffset)] = tasks.filter(t => t.id !== id); saveData(data); render(); }
        }
        function render() {
            const data = getData();
            const dateStr = getDateStr(currentOffset);
            document.getElementById('currentDate').textContent = formatDate(dateStr);
            const tasks = data.tasks[dateStr] || [];
            document.getElementById('taskList').innerHTML = tasks.map(t => 
                '<div class="task-item ' + (t.done?'completed':'') + '">' +
                '<input type="checkbox" ' + (t.done?'checked':'') + ' onchange="toggleTask(' + t.id + ')">' +
                '<span class="task-name">' + t.name + '</span>' +
                '<button class="delete-btn" onclick="deleteTask(' + t.id + ')">x</button></div>'
            ).join('');
            const done = tasks.filter(t => t.done).length;
            document.getElementById('todayDone').textContent = done;
            document.getElementById('todayTotal').textContent = tasks.length;
            document.getElementById('todayRate').textContent = tasks.length ? Math.round(done/tasks.length*100) + '%' : '0%';
            let streak = 0;
            for (let i = 0; i < 365; i++) {
                const d = data.tasks[getDateStr(-i)];
                if (d && d.length) { if (d.filter(t=>t.done).length/d.length >= 0.5) streak++; else break; }
                else if (i > 0) break;
            }
            document.getElementById('streak').textContent = streak;
            const today = new Date();
            const dayOfWeek = today.getDay();
            let weekHTML = '';
            for (let i = 0; i < 7; i++) {
                const d = new Date(today); d.setDate(d.getDate() - dayOfWeek + i);
                const dStr = d.toISOString().split('T')[0];
                const dayTasks = data.tasks[dStr] || [];
                const dayDone = dayTasks.filter(t => t.done).length;
                weekHTML += '<div class="day-stat ' + (dStr === getDateStr(0) ? 'today' : '') + '">' +
                    '<div class="day-name">' + ['日','一','二','三','四','五','六'][i] + '</div>' +
                    '<div class="day-count">' + dayDone + '</div>' + '<div class="day-total">/' + dayTasks.length + '</div></div>';
            }
            document.getElementById('weekStats').innerHTML = weekHTML;
            const dates = Object.keys(data.tasks).sort().reverse().slice(0, 10);
            document.getElementById('historyList').innerHTML = dates.map(d => {
                const dayTasks = data.tasks[d];
                return '<div class="history-item"><span>' + formatDate(d) + '</span><span>' + dayTasks.filter(t=>t.done).length + '/' + dayTasks.length + '</span></div>';
            }).join('');
        }
        render();
    </script>
</body>
</html>
